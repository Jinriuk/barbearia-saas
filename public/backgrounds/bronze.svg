<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a18"/>
      <stop offset="0.55" stop-color="#241708"/>
      <stop offset="1" stop-color="#140d05"/>
    </linearGradient>
    <pattern id="halftone" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.8" fill="#e3b878" fill-opacity="0.16"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="dotmask"><rect width="1600" height="1000" fill="url(#fade)"/></mask>
    <filter id="soft"><feGaussianBlur stdDeviation="90"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#warm)"/>
  <rect width="1600" height="1000" fill="url(#halftone)" mask="url(#dotmask)"/>
  <g filter="url(#soft)">
    <circle cx="1320" cy="760" r="240" fill="#a06b2c" fill-opacity="0.35"/>
  </g>
</svg>
